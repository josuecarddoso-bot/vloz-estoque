<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vloz Telecom — Estoque Profissional</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#162032" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="loginScreen" class="login-screen">
  <div class="login-bg-shape"></div>
  <div class="login-box">
    <div class="login-logo">
      <div class="logo-mark">VZ</div>
      <div class="login-logo-sub">vloZ telecom</div>
    </div>
    <h2 class="login-title">Acesso ao Sistema</h2>
    <div class="form-group">
      <label>Usuário</label>
      <input type="text" id="loginUser" placeholder="seu.usuario" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="loginPass" placeholder="••••••••" />
    </div>
    <div id="loginError" class="login-error hidden">Credenciais inválidas</div>
    <button class="btn-primary btn-full" onclick="App.login()">Entrar</button>
  </div>
</div>

<div id="appShell" class="app-shell hidden">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <span class="logo-name">VLOZ</span>
        <span class="logo-sub">Estoque</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" onclick="App.navigate('dashboard')">◈ Dashboard</button>
      <button class="nav-item" onclick="App.navigate('produtos')">▦ Produtos</button>
      <button class="nav-item" onclick="App.navigate('movimentacao')">⇄ Movimentação</button>
      <button class="nav-item" onclick="App.navigate('historico')">≡ Histórico</button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-badge">
        <div class="user-avatar" id="sidebarAvatar">U</div>
        <div class="user-info">
          <div class="user-name" id="sidebarUser">Usuário</div>
          <div class="user-role" id="sidebarRole">Carregando...</div>
        </div>
      </div>
      <button class="btn-logout" onclick="App.logout()">Sair</button>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div class="topbar-actions">
        <div class="stock-indicators">
          <div class="stock-ind"><span class="ind-dot dot-danger"></span> <span id="indZeradoVal">0</span></div>
          <div class="stock-ind"><span class="ind-dot dot-warn"></span> <span id="indBaixoVal">0</span></div>
        </div>
      </div>
    </header>

    <section id="page-produtos" class="page">
      <div class="page-header">
        <h1>Produtos</h1>
        <button class="btn-primary" onclick="App.openModalProduto()">+ Novo Produto</button>
      </div>
      <div class="filters-bar">
        <input type="text" id="searchProdutos" placeholder="Buscar SKU ou Nome..." oninput="App.renderProdutos()" />
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>SKU</th>
              <th>NOME</th>
              <th>CATEGORIA</th>
              <th>ESTOQUE</th>
              <th>AÇÕES</th>
            </tr>
          </thead>
          <tbody id="tabelaProdutosBody"></tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<div id="modalProduto" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <h2>Cadastrar Material</h2>
      <button onclick="App.closeModal('modalProduto')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group full">
          <label>Nome do Produto</label>
          <input type="text" id="prodNome" />
        </div>
        <div class="form-group">
          <label>Categoria (Gera o SKU)</label>
          <select id="prodCategoria" onchange="App.handleCategoriaChange()">
            <option value="">Selecione...</option>
            <option value="Rede">Rede</option>
            <option value="Equipamentos">Equipamentos</option>
            <option value="Cabos">Cabos</option>
            <option value="Ferramentas">Ferramentas</option>
          </select>
        </div>
        <div class="form-group">
          <label>SKU Gerado</label>
          <input type="text" id="prodCodigo" readonly style="background:#f0f2f5" />
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-primary" onclick="App.salvarProduto()">Salvar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast hidden"></div>
<script type="module" src="app.js"></script>
</body>
</html>
